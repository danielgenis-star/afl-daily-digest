name: AFL Daily Digest

on:
  schedule:
    # Runs at 21:30 UTC = 7:30 AM AEST (UTC+10)
    # Note: during daylight saving time (Oct–Apr) this fires at 8:30 AM AEDT.
    # To shift back to 7:30 AM year-round, change to '30 20 * * *' in summer.
    - cron: '30 21 * * *'

  # This button lets you trigger it manually from the GitHub website at any time
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser

      - name: Run AFL digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python afl_digest.py
